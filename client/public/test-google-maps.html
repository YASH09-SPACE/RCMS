<!DOCTYPE html>
<html>
<head>
    <title>Google Maps Test</title>
    <style>
        #map {
            height: 500px;
            width: 100%;
        }
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <h1>Google Maps API Test</h1>
    <div id="status" class="status">Loading...</div>
    <div id="map"></div>

    <script>
        function initMap() {
            const statusDiv = document.getElementById('status');
            try {
                const map = new google.maps.Map(document.getElementById('map'), {
                    center: { lat: 22.2587, lng: 71.1924 },
                    zoom: 7
                });
                
                // Add a marker
                new google.maps.Marker({
                    position: { lat: 23.0225, lng: 72.5714 },
                    map: map,
                    title: 'Ahmedabad'
                });

                statusDiv.className = 'status success';
                statusDiv.textContent = '✓ Google Maps loaded successfully!';
                console.log('Google Maps initialized');
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.textContent = '✗ Error: ' + error.message;
                console.error('Error initializing map:', error);
            }
        }

        window.onerror = function(msg, url, lineNo, columnNo, error) {
            const statusDiv = document.getElementById('status');
            statusDiv.className = 'status error';
            statusDiv.textContent = '✗ JavaScript Error: ' + msg;
            return false;
        };
    </script>
    
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAmVous8WcNJsm_7XY0c8z00bnGlNoHroU&libraries=places&callback=initMap" async defer></script>
</body>
</html>
